<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="skillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="480" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="390" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold" letter-spacing="0.5">LarkSuite CLI — 三层架构 + AI Agent Skills</text>
  <line x1="80" y1="48" x2="700" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- ── LEFT: Three-layer stack ── -->

  <!-- Layer 1: Shortcuts -->
  <rect x="60" y="68" width="400" height="108" rx="8" fill="#1e2235" stroke="url(#layer1Grad)" stroke-width="2"/>
  <rect x="60" y="68" width="400" height="32" rx="8" fill="url(#layer1Grad)" opacity="0.85"/>
  <rect x="60" y="88" width="400" height="12" fill="url(#layer1Grad)" opacity="0.85"/>
  <text x="78" y="89" fill="white" font-size="13" font-weight="bold">Layer 1 · Shortcuts（+ 前缀）</text>
  <text x="78" y="113" fill="#93c5fd" font-size="11">高频操作最优路径 · 人机共用 · 零参数记忆负担</text>
  <text x="78" y="132" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="132" fill="#7dd3fc" font-size="10">lark-cli calendar +agenda</text>
  <text x="78" y="150" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="150" fill="#7dd3fc" font-size="10">lark-cli im +messages-send --text "Hello"</text>
  <text x="78" y="168" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="168" fill="#7dd3fc" font-size="10">lark-cli wiki +export --format pdf</text>

  <!-- Arrow down -->
  <line x1="260" y1="176" x2="260" y2="196" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="255,193 265,193 260,200" fill="#475569"/>

  <!-- Layer 2: API Commands -->
  <rect x="60" y="200" width="400" height="108" rx="8" fill="#1e2235" stroke="url(#layer2Grad)" stroke-width="2"/>
  <rect x="60" y="200" width="400" height="32" rx="8" fill="url(#layer2Grad)" opacity="0.85"/>
  <rect x="60" y="220" width="400" height="12" fill="url(#layer2Grad)" opacity="0.85"/>
  <text x="78" y="221" fill="white" font-size="13" font-weight="bold">Layer 2 · API Commands（策展映射）</text>
  <text x="78" y="245" fill="#c4b5fd" font-size="11">精选 100+ 命令 · 1:1 对应平台接口 · 人工策展</text>
  <text x="78" y="264" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="264" fill="#ddd6fe" font-size="10">lark-cli calendar events instance_view --event-id ev_xxx</text>
  <text x="78" y="282" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="282" fill="#ddd6fe" font-size="10">lark-cli im messages create --receive-id user_id</text>
  <text x="78" y="300" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="300" fill="#ddd6fe" font-size="10">lark-cli schema calendar.events.instance_view</text>

  <!-- Arrow down -->
  <line x1="260" y1="308" x2="260" y2="328" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="255,325 265,325 260,332" fill="#475569"/>

  <!-- Layer 3: Raw API -->
  <rect x="60" y="332" width="400" height="108" rx="8" fill="#1e2235" stroke="url(#layer3Grad)" stroke-width="2"/>
  <rect x="60" y="332" width="400" height="32" rx="8" fill="url(#layer3Grad)" opacity="0.85"/>
  <rect x="60" y="352" width="400" height="12" fill="url(#layer3Grad)" opacity="0.85"/>
  <text x="78" y="353" fill="white" font-size="13" font-weight="bold">Layer 3 · Raw API（完整性保证）</text>
  <text x="78" y="377" fill="#fda4af" font-size="11">2500+ APIs 全覆盖 · 长尾需求逃生舱 · 向前兼容</text>
  <text x="78" y="396" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="396" fill="#fecdd3" font-size="10">lark-cli api GET /open-apis/calendar/v4/calendars/...</text>
  <text x="78" y="414" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="414" fill="#fecdd3" font-size="10">lark-cli api POST /open-apis/im/v1/messages --body @data.json</text>
  <text x="78" y="432" fill="#64748b" font-size="10">$ </text>
  <text x="90" y="432" fill="#fecdd3" font-size="10">lark-cli api GET /open-apis/wiki/v2/spaces --format ndjson</text>

  <!-- ── RIGHT: AI Agent Skills ── -->
  <rect x="488" y="68" width="270" height="372" rx="8" fill="#0d1f17" stroke="url(#skillGrad)" stroke-width="2"/>
  <rect x="488" y="68" width="270" height="32" rx="8" fill="url(#skillGrad)" opacity="0.85"/>
  <rect x="488" y="88" width="270" height="12" fill="url(#skillGrad)" opacity="0.85"/>
  <text x="623" y="89" text-anchor="middle" fill="white" font-size="13" font-weight="bold">AI Agent Skills（19 个）</text>
  <text x="623" y="113" text-anchor="middle" fill="#6ee7b7" font-size="10">SKILL.md · 自然语言路由</text>

  <!-- Skills list - two columns -->
  <!-- Left column -->
  <text x="504" y="136" fill="#34d399" font-size="10">✦ lark-bitable</text>
  <text x="504" y="153" fill="#34d399" font-size="10">✦ lark-calendar</text>
  <text x="504" y="170" fill="#34d399" font-size="10">✦ lark-docx</text>
  <text x="504" y="187" fill="#34d399" font-size="10">✦ lark-drive</text>
  <text x="504" y="204" fill="#34d399" font-size="10">✦ lark-email</text>
  <text x="504" y="221" fill="#34d399" font-size="10">✦ lark-hire</text>
  <text x="504" y="238" fill="#34d399" font-size="10">✦ lark-im</text>
  <text x="504" y="255" fill="#34d399" font-size="10">✦ lark-okr</text>
  <text x="504" y="272" fill="#34d399" font-size="10">✦ lark-sheets</text>
  <text x="504" y="289" fill="#34d399" font-size="10">✦ lark-task</text>
  <!-- Right column -->
  <text x="628" y="136" fill="#34d399" font-size="10">✦ lark-wiki</text>
  <text x="628" y="153" fill="#34d399" font-size="10">✦ lark-approval</text>
  <text x="628" y="170" fill="#34d399" font-size="10">✦ lark-attendance</text>
  <text x="628" y="187" fill="#34d399" font-size="10">✦ lark-contact</text>
  <text x="628" y="204" fill="#34d399" font-size="10">✦ lark-minutes</text>
  <text x="628" y="221" fill="#34d399" font-size="10">✦ lark-meegle</text>
  <text x="628" y="238" fill="#34d399" font-size="10">✦ lark-report</text>
  <text x="628" y="255" fill="#34d399" font-size="10">✦ lark-search</text>
  <text x="628" y="272" fill="#34d399" font-size="10">✦ lark-workspace</text>

  <!-- Separator -->
  <line x1="504" y1="300" x2="742" y2="300" stroke="#1e4d36" stroke-width="1"/>

  <!-- Skill routing note -->
  <text x="623" y="322" text-anchor="middle" fill="#64748b" font-size="9.5">路由机制</text>
  <rect x="504" y="330" width="228" height="46" rx="5" fill="#0a1a0f" stroke="#1e4d36" stroke-width="1"/>
  <text x="618" y="348" text-anchor="middle" fill="#6ee7b7" font-size="9">纯 LLM 推理匹配</text>
  <text x="618" y="363" text-anchor="middle" fill="#94a3b8" font-size="8.5">无 embedding / 无分类器</text>
  <text x="618" y="376" text-anchor="middle" fill="#94a3b8" font-size="8.5">name + description → 自然语言召回</text>

  <!-- Bracket connecting CLI to Skills -->
  <text x="469" y="258" text-anchor="middle" fill="#10b981" font-size="16" filter="url(#glow)">↔</text>
  <text x="469" y="275" text-anchor="middle" fill="#64748b" font-size="8">桥接</text>

  <!-- Bottom label -->
  <text x="390" y="462" text-anchor="middle" fill="#475569" font-size="9">CLI 定义操作空间 · Skill 封装使用知识 · Agent 按意图路由</text>
</svg>
